<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nooly.me</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <meta name="google-adsense-account" content="ca-pub-5176538174021609">
  </head>
<body>
    <main>
      <h1>IS <span>OFFLINE</span><span id="dots">.</span></h1>
    </main>

    <footer>
      <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5176538174021609" crossorigin="anonymous"></script>
        <!-- nooly -->
      <ins class="adsbygoogle"
          style="display:block"
          data-ad-client="ca-pub-5176538174021609"
          data-ad-slot="8545959063"
          data-ad-format="auto"
          data-full-width-responsive="true">
      </ins>
      <script>
          (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </footer>

    <style>

      *{
        margin: 0;
        padding: 0;
      }

        body {
            background-color: #1A1726;
            font-family: 'Poppins', sans-serif;
            align-items: center;
            height: 100vh;
        }


        main, footer{
          display: flex;
          justify-content: center;
          align-items: center;
          
        }

        main{
          height: 70vh;
          width: 100%;
          bottom: 0;
        }

        footer{
          background-color: hsl(252, 25%, 16%);
          width: 100%;
          height: 30vh;
          bottom: 0;

        }

        h1{
            color: white;
            font-size: 40pt;

            & span{
                color: #F90670;
            }
        }

        #dots{
            content: '...';
            color: white;
            position: absolute;
        }

        @media (max-width: 600px) {
          h1{
            font-size: 25pt;
          }}

        @media (max-width: 400px) {
          h1{
            font-size: 18pt;
        }}
      </style>

<script>
    const dots = document.querySelector('#dots');
    let count = 1;

    setInterval(() => {
      if (count === 1) {
        dots.textContent = '.';
      } else if (count === 2) {
        dots.textContent = '..';
      } else if (count === 3) {
        dots.textContent = '...';
      }
      count = (count + 1) % 4; // De 1 a 3, depois volta para 1
    }, 300); // A cada 500ms
  </script>
</body>
</html>
